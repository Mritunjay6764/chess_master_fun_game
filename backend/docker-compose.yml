version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: chessmate-db
    environment:
      POSTGRES_USER: chessmate
      POSTGRES_PASSWORD: chessmate123
      POSTGRES_DB: chessmate
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chessmate"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: